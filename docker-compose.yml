version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: perfpatrol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-perfpatrol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-perfpatrol}
      POSTGRES_DB: ${POSTGRES_DB:-perfpatrol}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-perfpatrol} -d ${POSTGRES_DB:-perfpatrol}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: perfpatrol-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: perfpatrol-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-perfpatrol}:${POSTGRES_PASSWORD:-perfpatrol}@postgres:5432/${POSTGRES_DB:-perfpatrol}?schema=public
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    container_name: perfpatrol-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-perfpatrol}:${POSTGRES_PASSWORD:-perfpatrol}@postgres:5432/${POSTGRES_DB:-perfpatrol}?schema=public
      REDIS_URL: redis://redis:6379
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    cap_add:
      - SYS_ADMIN

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
